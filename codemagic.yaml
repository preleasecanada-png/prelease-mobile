workflows:
  ios-unsigned:
    name: iOS Unsigned IPA (sideload via AltStore/Sideloadly)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/Readyrental.xcworkspace"
        XCODE_SCHEME: "Readyrental"
        BUNDLE_ID: "com.readyrental"
      node: 18.20.4
      xcode: latest
      cocoapods: 1.11.3
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Enable Corepack + show env
        script: |
          set -e
          corepack enable
          node --version
          npm --version
          yarn --version || true
          ruby --version
          pod --version
          xcodebuild -version
      - name: Configure Yarn for node_modules (RN compat)
        script: |
          # Force legacy node_modules linker (not PnP) for React Native
          cat > .yarnrc.yml <<'EOF'
          nodeLinker: node-modules
          enableImmutableInstalls: false
          enableTelemetry: false
          EOF
          # Disable patch-package postinstall to avoid hard-failures on missing patches
          npm pkg delete scripts.postinstall || true
          cat package.json | head -20
      - name: Install JS dependencies via npm (fallback-safe)
        script: |
          set -e
          # Try Yarn 4 first; if it fails, fall back to npm
          if yarn install --mode=skip-build 2>&1; then
            echo "yarn install OK"
          else
            echo "yarn failed, falling back to npm"
            rm -rf node_modules .yarn
            npm pkg delete packageManager || true
            npm install --legacy-peer-deps --no-audit --no-fund
          fi
      - name: Apply patches if any (non-fatal)
        script: |
          if [ -d patches ] && ls patches/*.patch >/dev/null 2>&1; then
            npx patch-package || echo "patch-package finished with warnings"
          else
            echo "No patches to apply"
          fi
      - name: Patch podspecs + Ruby helpers for Ruby 3.2+ (File.exists? removed)
        script: |
          # Ruby 3.2 removed File.exists?; patch ALL .podspec and .rb files
          # across node_modules + ios (covers reanimated's find_config helper, etc.)
          find node_modules -type f \( -name '*.podspec' -o -name '*.podspec.json' -o -name '*.rb' \) \
            -exec grep -l 'File\.exists?' {} \; 2>/dev/null | \
            while read f; do
              echo "patching $f"
              sed -i '' -e 's/File\.exists?/File.exist?/g' "$f"
            done
          # Also patch any helper rb inside ios/ folder
          find ios -type f -name '*.rb' -exec grep -l 'File\.exists?' {} \; 2>/dev/null | \
            while read f; do
              echo "patching $f"
              sed -i '' -e 's/File\.exists?/File.exist?/g' "$f"
            done
          echo "Ruby 3.2 patches applied"
      - name: Patch boost.podspec (URL + checksum, JFrog defunct)
        script: |
          BOOST_POD="node_modules/react-native/third-party-podspecs/boost.podspec"
          echo "=== boost.podspec full content BEFORE ==="
          cat "$BOOST_POD" || echo "FILE NOT FOUND"
          echo "==========================================="
          # Use Python for robust replacement (handles single/double quotes, multiline)
          python3 <<'PYEOF'
          import re, os
          path = "node_modules/react-native/third-party-podspecs/boost.podspec"
          if not os.path.isfile(path):
              print(f"NOT FOUND: {path}")
              raise SystemExit(0)
          with open(path) as f:
              src = f.read()
          # Replace any :http => "..." URL with archives.boost.io (official, stable)
          src = re.sub(
              r':http\s*=>\s*["\'][^"\']+boost_1_76_0\.tar\.bz2["\']',
              ':http => "https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.bz2"',
              src,
          )
          # Replace any :sha256 => "..." with the known-good hash for archives.boost.io
          src = re.sub(
              r':sha256\s*=>\s*["\'][a-f0-9]+["\']',
              ':sha256 => "f0397ba6e982c4450f27bf32a2a83292aba035b827a5623a14636ea583318c41"',
              src,
          )
          with open(path, "w") as f:
              f.write(src)
          print("patched boost.podspec")
          PYEOF
          echo "=== boost.podspec full content AFTER ==="
          cat "$BOOST_POD"
          echo "========================================="
          # Wipe any cached corrupted boost download
          rm -rf "$HOME/Library/Caches/CocoaPods/Pods/External Sources/boost" 2>/dev/null || true
          rm -rf "$HOME/Library/Caches/CocoaPods/Pods/Release/boost" 2>/dev/null || true
          rm -rf "$HOME/.cocoapods/repos.source/boost"* 2>/dev/null || true

      - name: Patch RN codegen helper for Ruby 4 (use_react_native_codegen! arity)
        script: |
          set -e
          python3 <<'PYEOF'
          import os, re
          path = "node_modules/react-native/scripts/react_native_pods.rb"
          if not os.path.isfile(path):
              print(f"NOT FOUND: {path}")
              raise SystemExit(0)
          with open(path, "r", encoding="utf-8") as f:
              src = f.read()

          # Make the legacy helper accept variable arguments (Ruby 4 + CocoaPods DSL changes can alter arity)
          # Original: def use_react_native_codegen!(spec, options={})
          replacement = (
              "def use_react_native_codegen!(*args, **kwargs)\n"
              "  spec = args[0]\n"
              "  options = args[1]\n"
              "  if options.nil? || (options.is_a?(Hash) && options.empty?)\n"
              "    options = kwargs\n"
              "  end\n"
              "  options ||= {}\n"
          )

          # Debug: show any existing def lines for this method
          defs = re.findall(r"^def(?:\s+self\.)?\s*use_react_native_codegen!.*$", src, flags=re.M)
          if defs:
              print("FOUND DEFINITIONS:")
              for d in defs[:10]:
                  print(d)
          else:
              print("FOUND DEFINITIONS: none")

          before = src
          # Handle LF or CRLF line endings and any signature; patch instance or module method forms.
          src = re.sub(
              r"^def(?:\s+self\.)?\s*use_react_native_codegen!.*$",
              replacement.rstrip("\n"),
              src,
              count=1,
              flags=re.M,
          )

          if src == before:
              raise SystemExit("ERROR: could not patch use_react_native_codegen! definition")

          with open(path, "w", encoding="utf-8") as f:
              f.write(src)
          print(f"patched: {path}")

          # Verify in logs
          m = re.search(r"^def(?:\s+self\.)?\s*use_react_native_codegen!.*$", src, flags=re.M)
          print("VERIFY:", m.group(0) if m else "NOT FOUND")

          # Fix internal keyword-arg call: get_script_phases_no_codegen_discovery(react_native_path: ..., ...)
          # This method is defined as `def get_script_phases_no_codegen_discovery(options)` (1 positional).
          # Under Ruby 4 strict keyword separation, the keyword form crashes with
          # 'wrong number of arguments (given N, expected 1)'. Wrap the keywords in an explicit hash.
          idx = src.find("get_script_phases_no_codegen_discovery(")
          if idx != -1:
              open_paren = src.find("(", idx)
              depth = 0
              k = open_paren
              while k < len(src):
                  c = src[k]
                  if c == "(":
                      depth += 1
                  elif c == ")":
                      depth -= 1
                      if depth == 0:
                          break
                  k += 1
              if k < len(src) and depth == 0:
                  inner = src[open_paren+1:k]
                  # Only wrap if it isn't already wrapped in braces
                  stripped = inner.strip()
                  if not (stripped.startswith("{") and stripped.endswith("}")):
                      new_call = "({" + inner + "})"
                      src = src[:open_paren] + new_call + src[k+1:]
                      with open(path, "w", encoding="utf-8") as f:
                          f.write(src)
                      print("patched internal get_script_phases_no_codegen_discovery call")
                  else:
                      print("internal call already wrapped in hash")
          else:
              print("internal call not found")
          PYEOF

      - name: Patch RN podspec codegen calls for Ruby 4 (dispatch via Object.send)
        script: |
          set -e
          python3 <<'PYEOF'
          import os
          import re

          targets = [
              "node_modules/react-native/React/FBReactNativeSpec/FBReactNativeSpec.podspec",
              "node_modules/react-native/ReactCommon/React-rncore.podspec",
          ]

          for path in targets:
              if not os.path.isfile(path):
                  print(f"NOT FOUND: {path}")
                  continue

              with open(path, "r", encoding="utf-8") as f:
                  src = f.read()

              # Ruby 4 keyword-arg separation: some environments expose use_react_native_codegen!
              # as (spec, **kwargs). Convert the legacy options hash call to keyword args.
              # Handles both:
              #   use_react_native_codegen!(s, { :k => v, ... })
              #   Object.send(:use_react_native_codegen!, s, { :k => v, ... })
              def convert(match):
                  body = match.group(1)
                  # Convert :key => value to key: value (best-effort)
                  body = re.sub(r":([a-zA-Z0-9_]+)\s*=>", r"\1:", body)
                  # Drop braces
                  body = body.strip()
                  if body.startswith("{") and body.endswith("}"):
                      body = body[1:-1].strip()
                  return f"use_react_native_codegen!(s, {body})"

              # Multi-line match: grab the hash literal including braces.
              src2 = re.sub(
                  r"Object\.send\(\s*:use_react_native_codegen!\s*,\s*s\s*,\s*(\{.*?\})\s*\)",
                  convert,
                  src,
                  flags=re.S,
              )
              src2 = re.sub(
                  r"use_react_native_codegen!\(\s*s\s*,\s*(\{.*?\})\s*\)",
                  convert,
                  src2,
                  flags=re.S,
              )

              if src2 != src:
                  with open(path, "w", encoding="utf-8") as f:
                      f.write(src2)
                  print(f"patched: {path}")
              else:
                  print(f"no changes needed: {path}")
          PYEOF
      - name: Install Ruby 3.1 + CocoaPods + pod install (single shell)
        script: |
          set -e
          echo "=== System Ruby (default) ==="
          ruby --version || true

          # Install Ruby 3.1 via Homebrew (already preinstalled on Codemagic mac mini m2)
          brew install ruby@3.1 || brew upgrade ruby@3.1 || true
          BREW_PREFIX="$(brew --prefix ruby@3.1)"
          echo "BREW_PREFIX=$BREW_PREFIX"
          export PATH="$BREW_PREFIX/bin:$PATH"
          export GEM_HOME="$HOME/.gem-ruby31"
          export GEM_PATH="$GEM_HOME"
          export PATH="$GEM_HOME/bin:$PATH"
          mkdir -p "$GEM_HOME"

          echo "=== Active Ruby ==="
          which ruby
          ruby --version

          # Install CocoaPods 1.11.3 + compatible activesupport on Ruby 3.1
          gem install activesupport -v 6.1.7.10 --no-document
          gem install cocoapods -v 1.11.3 --no-document

          echo "=== Active pod ==="
          which pod
          pod --version

          # Verify patches before running pod install
          echo "=== react_native_pods.rb (lines 170-280) ==="
          sed -n '170,280p' node_modules/react-native/scripts/react_native_pods.rb || true
          echo "=== FBReactNativeSpec.podspec ==="
          cat node_modules/react-native/React/FBReactNativeSpec/FBReactNativeSpec.podspec || true

          # Run pod install with Ruby 3.1
          cd ios && pod install --repo-update
      - name: Neutralize Metro packager script phase (prevents CI hang)
        script: |
          # The 'Start Packager' RN script tries to open Metro on :8081 and can hang in CI.
          # Replace its body with a no-op echo.
          PBX="ios/Readyrental.xcodeproj/project.pbxproj"
          if [ -f "$PBX" ]; then
            python3 <<'PYEOF'
          import re
          path = "ios/Readyrental.xcodeproj/project.pbxproj"
          with open(path) as f:
              s = f.read()
          # Find shell script blocks containing 'launchPackager' or metro-start and neutralize shellScript
          def replace_shell(match):
              block = match.group(0)
              if 'launchPackager' in block or 'Start Packager' in block or 'Metro' in block.lower():
                  # Replace the shellScript = "..."; with a no-op
                  return re.sub(r'shellScript = "[^"]*";', 'shellScript = "echo Skipping Metro packager in CI";', block)
              return block
          # Match shell script build phase blocks
          s2 = re.sub(r'/\* Begin PBXShellScriptBuildPhase section \*/.*?/\* End PBXShellScriptBuildPhase section \*/', replace_shell, s, flags=re.DOTALL)
          if s != s2:
              with open(path, 'w') as f:
                  f.write(s2)
              print("patched project.pbxproj")
          else:
              print("no changes needed")
          PYEOF
          fi
      - name: Build unsigned archive
        script: |
          set -o pipefail
          export RCT_NO_LAUNCH_PACKAGER=1
          export FORCE_BUNDLING=1
          # Pipe to xcpretty-like tail so CI logs stay readable and we see errors
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/build/Readyrental.xcarchive" \
            -quiet \
            -parallelizeTargets \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" 2>&1 | tee /tmp/xcodebuild.log
          RESULT=${PIPESTATUS[0]}
          if [ $RESULT -ne 0 ]; then
            echo "=== Last 200 lines of xcodebuild log (errors) ==="
            grep -E '(error:|warning:|FAILED|failed)' /tmp/xcodebuild.log | tail -200 || true
            echo "=== Tail 100 lines raw ==="
            tail -100 /tmp/xcodebuild.log
            exit $RESULT
          fi
      - name: Package unsigned IPA
        script: |
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -R $CM_BUILD_DIR/build/Readyrental.xcarchive/Products/Applications/Readyrental.app \
             $CM_BUILD_DIR/build/Payload/
          cd $CM_BUILD_DIR/build
          zip -qr Readyrental-unsigned.ipa Payload
          ls -la Readyrental-unsigned.ipa
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/build/Readyrental.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-signed-testflight:
    name: iOS Signed IPA (TestFlight via App Store Connect)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-app-store
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.readyrental
      vars:
        XCODE_WORKSPACE: "ios/Readyrental.xcworkspace"
        XCODE_SCHEME: "Readyrental"
      node: 18.20.4
      xcode: latest
      cocoapods: 1.11.3
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          cd ios && pod install --repo-update
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
