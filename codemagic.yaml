workflows:
  ios-unsigned:
    name: iOS Unsigned IPA (sideload via AltStore/Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/Readyrental.xcworkspace"
        XCODE_SCHEME: "Readyrental"
        BUNDLE_ID: "com.readyrental"
      node: 18.20.4
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Force Yarn classic 1.22 (bypass corepack Yarn 4)
        script: |
          set -e
          # Codemagic auto-activates Corepack which pulls Yarn 4 (requires fetch/Node18+).
          # This project (RN 0.70) needs Yarn 1 classic. Fully disable corepack.
          corepack disable || true
          # Remove corepack shims so `yarn` does NOT resolve to Node's bundled corepack.
          rm -f "$(dirname "$(which node)")/yarn" "$(dirname "$(which node)")/yarnpkg" || true
          rm -f /usr/local/bin/yarn /usr/local/bin/yarnpkg || true
          # Install classic yarn globally
          npm install -g yarn@1.22.22
          hash -r
          which yarn
          yarn --version
      - name: Strip packageManager field and postinstall
        script: |
          # Some toolchains add "packageManager": "yarn@4.x" which forces corepack.
          npm pkg delete packageManager || true
          npm pkg delete scripts.postinstall || true
          grep -E "packageManager|postinstall" package.json || echo "fields removed OK"
      - name: Show env versions
        script: |
          node --version
          npm --version
          yarn --version
          ruby --version
          pod --version
          xcodebuild -version
      - name: Install JS dependencies (yarn classic)
        script: |
          # Disable patch-package postinstall to avoid hard-failures on missing patches
          npm pkg delete scripts.postinstall || true
          yarn install --ignore-engines --network-timeout 600000
      - name: Apply patches if any (non-fatal)
        script: |
          if [ -d patches ] && ls patches/*.patch >/dev/null 2>&1; then
            npx patch-package || echo "patch-package finished with warnings"
          else
            echo "No patches to apply"
          fi
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Build unsigned archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/build/Readyrental.xcarchive" \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
      - name: Package unsigned IPA
        script: |
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -R $CM_BUILD_DIR/build/Readyrental.xcarchive/Products/Applications/Readyrental.app \
             $CM_BUILD_DIR/build/Payload/
          cd $CM_BUILD_DIR/build
          zip -qr Readyrental-unsigned.ipa Payload
          ls -la Readyrental-unsigned.ipa
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/build/Readyrental.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-signed-testflight:
    name: iOS Signed IPA (TestFlight via App Store Connect)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-app-store
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.readyrental
      vars:
        XCODE_WORKSPACE: "ios/Readyrental.xcworkspace"
        XCODE_SCHEME: "Readyrental"
      node: 18.20.4
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          cd ios && pod install --repo-update
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
