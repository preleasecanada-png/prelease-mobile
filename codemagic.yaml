workflows:
  ios-unsigned:
    name: iOS Unsigned IPA (sideload via AltStore/Sideloadly)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_WORKSPACE: "ios/Readyrental.xcworkspace"
        XCODE_SCHEME: "Readyrental"
        BUNDLE_ID: "com.readyrental"
      node: 18.20.4
      xcode: latest
      cocoapods: 1.11.3
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $CM_BUILD_DIR/node_modules
    scripts:
      - name: Enable Corepack + show env
        script: |
          set -e
          corepack enable
          node --version
          npm --version
          yarn --version || true
          ruby --version
          pod --version
          xcodebuild -version
      - name: Configure Yarn for node_modules (RN compat)
        script: |
          # Force legacy node_modules linker (not PnP) for React Native
          cat > .yarnrc.yml <<'EOF'
          nodeLinker: node-modules
          enableImmutableInstalls: false
          enableTelemetry: false
          EOF
          # Disable patch-package postinstall to avoid hard-failures on missing patches
          npm pkg delete scripts.postinstall || true
          cat package.json | head -20
      - name: Install JS dependencies via npm (fallback-safe)
        script: |
          set -e
          # Try Yarn 4 first; if it fails, fall back to npm
          if yarn install --mode=skip-build 2>&1; then
            echo "yarn install OK"
          else
            echo "yarn failed, falling back to npm"
            rm -rf node_modules .yarn
            npm pkg delete packageManager || true
            npm install --legacy-peer-deps --no-audit --no-fund
          fi
      - name: Apply patches if any (non-fatal)
        script: |
          if [ -d patches ] && ls patches/*.patch >/dev/null 2>&1; then
            npx patch-package || echo "patch-package finished with warnings"
          else
            echo "No patches to apply"
          fi
      - name: Patch podspecs + Ruby helpers for Ruby 3.2+ (File.exists? removed)
        script: |
          # Ruby 3.2 removed File.exists?; patch ALL .podspec and .rb files
          # across node_modules + ios (covers reanimated's find_config helper, etc.)
          find node_modules -type f \( -name '*.podspec' -o -name '*.podspec.json' -o -name '*.rb' \) \
            -exec grep -l 'File\.exists?' {} \; 2>/dev/null | \
            while read f; do
              echo "patching $f"
              sed -i '' -e 's/File\.exists?/File.exist?/g' "$f"
            done
          # Also patch any helper rb inside ios/ folder
          find ios -type f -name '*.rb' -exec grep -l 'File\.exists?' {} \; 2>/dev/null | \
            while read f; do
              echo "patching $f"
              sed -i '' -e 's/File\.exists?/File.exist?/g' "$f"
            done
          echo "Ruby 3.2 patches applied"
      - name: Install CocoaPods
        script: |
          cd ios && pod install --repo-update
      - name: Build unsigned archive
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$CM_BUILD_DIR/build/Readyrental.xcarchive" \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""
      - name: Package unsigned IPA
        script: |
          mkdir -p $CM_BUILD_DIR/build/Payload
          cp -R $CM_BUILD_DIR/build/Readyrental.xcarchive/Products/Applications/Readyrental.app \
             $CM_BUILD_DIR/build/Payload/
          cd $CM_BUILD_DIR/build
          zip -qr Readyrental-unsigned.ipa Payload
          ls -la Readyrental-unsigned.ipa
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa
      - $CM_BUILD_DIR/build/Readyrental.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-signed-testflight:
    name: iOS Signed IPA (TestFlight via App Store Connect)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic-app-store
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.readyrental
      vars:
        XCODE_WORKSPACE: "ios/Readyrental.xcworkspace"
        XCODE_SCHEME: "Readyrental"
      node: 18.20.4
      xcode: latest
      cocoapods: 1.11.3
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          cd ios && pod install --repo-update
      - name: Set up provisioning profiles
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios
          agvtool new-version -all $(($BUILD_NUMBER + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
